name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install httpx

      - name: Backend smoke test
        env:
          API_KEY: Ansh
        run: |
          python - <<'PY'
          from fastapi.testclient import TestClient
          from app import app

          with TestClient(app) as client:
              root = client.get('/')
              assert root.status_code == 200
              assert 'Iris' in root.text

              health = client.get('/health')
              assert health.status_code == 200
              assert health.json()['model_loaded'] is True

              protected_prediction = client.post(
                  '/predict',
                  json={'features': [5.1, 3.5, 1.4, 0.2]},
                  headers={'x-api-key': 'Ansh'}
              )
              assert protected_prediction.status_code == 200

              ui_prediction = client.post(
                  '/predict-ui',
                  json={'features': [5.1, 3.5, 1.4, 0.2]}
              )
              assert ui_prediction.status_code == 200
          PY

  docker:
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: docker
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Trigger deployment webhook if configured
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
        run: |
          if [ -z "$DEPLOY_WEBHOOK_URL" ]; then
            echo "DEPLOY_WEBHOOK_URL is not set. Skipping deployment trigger."
            exit 0
          fi

          curl --fail --show-error --silent \
            -X POST \
            -H 'Content-Type: application/json' \
            -d '{"repository":"${{ github.repository }}","ref":"${{ github.ref_name }}","sha":"${{ github.sha }}"}' \
            "$DEPLOY_WEBHOOK_URL"
